    <!-- Preemptively set dark mode to prevent FOUC -->
    <script>
      (function() {
        try {
          var isDark = localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (isDark) {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch (_) {}
      })();
    </script>
  </head>

    <script type="module" src="/src/main.jsx"></script>
  </body>
